version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_DB: mlops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # TimescaleDB（时序数据库）
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: mlops-timescaledb
    environment:
      POSTGRES_DB: timeseries
      POSTGRES_USER: timescale
      POSTGRES_PASSWORD: timescale
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timescale"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # Neo4j图数据库
  neo4j:
    image: neo4j:5-enterprise
    container_name: mlops-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # Redis（缓存和消息队列）
  redis:
    image: redis:7-alpine
    container_name: mlops-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network

  # MinIO（S3兼容对象存储）
  minio:
    image: minio/minio:latest
    container_name: mlops-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API端口
      - "9001:9001"  # 控制台端口
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mlops-network

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlops-mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://postgres:postgres@postgres/mlops
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./mlflow-artifacts:/mlflow-artifacts
    networks:
      - mlops-network

  # Ray集群头节点
  ray-head:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    container_name: mlops-ray-head
    environment:
      RAY_ADDRESS: auto
      RAY_HEAD_SERVICE_HOST: ray-head
      RAY_HEAD_SERVICE_PORT: 6379
    ports:
      - "8265:8265"  # Dashboard
      - "6379:6379"  # Redis
      - "10001:10001"  # 对象存储
    command: >
      ray start
      --head
      --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --object-store-memory=4000000000
      --num-cpus=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8265/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network

  # Ray工作节点
  ray-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.training
    container_name: mlops-ray-worker
    environment:
      RAY_ADDRESS: ray-head:6379
    depends_on:
      - ray-head
    command: >
      ray start
      --address=ray-head:6379
    deploy:
      replicas: 2
    networks:
      - mlops-network

  # API服务
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mlops-api
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://postgres:postgres@postgres/mlops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RAY_ADDRESS: ray-head:6379
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      ray-head:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    networks:
      - mlops-network

  # 监控服务
  monitoring:
    build:
      context: .
      dockerfile: docker/Dockerfile.monitoring
    container_name: mlops-monitoring
    environment:
      EVIDENTLY_DASH_PORT: 8050
      ARIZE_PHOENIX_PORT: 6006
    ports:
      - "8050:8050"  # Evidently
      - "6006:6006"  # Arize Phoenix
    depends_on:
      - api
    volumes:
      - ./monitoring:/app/monitoring
    networks:
      - mlops-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: mlops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - mlflow
      - monitoring
    networks:
      - mlops-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: mlops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/console_templates'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - mlops-network

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: mlops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - mlops-network

volumes:
  postgres_data:
  timescaledb_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  mlops-network:
    driver: bridge
